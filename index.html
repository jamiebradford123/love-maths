<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font awesome and google fonts link-->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css?family=Raleway%7CRighteous" rel="stylesheet">

    <!-- links to css-->
    <link rel="stylesheet" href="assets/css/style.css"> 
    <title>Document</title>
</head>
<body>
    <!-- Heading-->
    <h1 class="heading">
        <img class="logo" src="assets/images/logo.png" alt="logo"> Love Maths 
    </h1>

    <!-- Game area -->
    <div class="game-area">
        <!-- Controlls area div- buttons at the top of the div will go here which allow user to select which game they want to play-->
        <div class="controls-area">
            <!-- add-->
            <button data-type="addition" class="btn btn--big btn--green">
                <i class="fas fa-plus"></i>
            </button>

            <!-- subtract-->
            <button data-type="subtract" class="btn btn--big btn--blue">
                <i class="fas fa-minus"></i>
            </button>

            <!-- multiply-->
            <button data-type="multiply" class="btn btn--big btn--orange">
                <i class="fas fa-times"></i>
            </button>

            <!-- divide-->
            <button data-type="division" class="btn btn--big btn--red">
                <i class="fas fa-divide"></i>
            </button>
        </div>

        <!-- Question area below the buttons-->
        <div class="question-area">
            <!-- 4 spans for each part of the question, one for the first number, one for the operation, one of the second number and then one for the equals-->
            <span id="operand1">0</span>
            <span id="operator">x</span>
            <span id="operand2">0</span>
            <span>=</span>
            <p class="answer-message">Enter answer</p> <!-- this will only be visable on mobile-->
            <input id="answer-box" type="number"> <!-- answer box which only allows numbers-->
        </div>

        <!-- button to submit answers-->
        <button data-type="submit" class="btn btn--gray">Submit Answer</button>
    </div>

    <!-- Score Area-->
    <div class="score-area">
        <p class="scores">Correct Answers <span id="score">0</span></p>
        <p class="scores">Incorrect Answers<span id="incorrect">0</span></p>
    </div>

    <!-- Put js at the bottom of the body so it loads in last-->
    <script src="assets/js/script.js"></script>
</body>
</html>
